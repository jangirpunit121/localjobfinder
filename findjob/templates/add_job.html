{% extends 'base.html' %}
{% block title %}Add New Job{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Post a New Job</h3>
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <!-- Job Title -->
                    <div class="mb-3">
                        <label for="title" class="form-label">Job Title *</label>
                        <input type="text" name="title" id="title" class="form-control" required>
                    </div>

                    <!-- Description -->
                    <div class="mb-3">
                        <label for="description" class="form-label">Job Description *</label>
                        <textarea name="description" id="description" rows="5" class="form-control" required></textarea>
                    </div>

                    <!-- Location -->
                    <div class="mb-3">
                        <label for="location" class="form-label">Location *</label>
                        <input type="text" name="location" id="location" class="form-control" required>
                    </div>

                    <!-- Salary -->
                    <div class="mb-3">
                        <label for="salary" class="form-label">Salary (e.g., ₹20,000 - ₹30,000)</label>
                        <input type="text" name="salary" id="salary" class="form-control">
                    </div>

                    <!-- Job Type -->
                    <div class="mb-3">
                        <label for="job_type" class="form-label">Job Type *</label>
                        <select name="job_type" id="job_type" class="form-select" required>
                            <option value="">Select type</option>
                            <option value="full_time">Full Time</option>
                            <option value="part_time">Part Time</option>
                            <option value="internship">Internship</option>
                        </select>
                    </div>

                    <!-- Category -->
                    <div class="mb-3">
                        <label for="category" class="form-label">Category *</label>
                        <input type="text" name="category" id="category" class="form-control" placeholder="e.g., Customer Support, Python Developer" required>
                    </div>

                    <!-- Company (only for superadmin, otherwise hidden/disabled) -->
                    {% if user.is_superuser %}
                    <div class="mb-3">
                        <label for="company" class="form-label">Company (for admin)</label>
                        <select name="company_id" id="company" class="form-select">
                            <option value="">Select company</option>
                            {% for company in companies %}
                                <option value="{{ company.id }}">{{ company.company_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    {% else %}
                        <!-- For normal company users, company is auto-assigned in backend -->
                        <input type="hidden" name="company_id" value="{{ request.user.companyprofile.id }}">
                    {% endif %}

                    <button type="submit" class="btn btn-primary w-100">Post Job</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
