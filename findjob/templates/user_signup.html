{% extends 'base.html' %}
{% block title %}Job Seeker Signup{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Job Seeker Registration</h2>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
                <label>Full Name</label>
                <input type="text" name="full_name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Phone</label>
                <input type="text" name="phone" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Qualification (e.g., B.Tech, MCA, B.Sc)</label>
                <input type="text" name="qualification" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Experience (Years)</label>
                <input type="number" name="experience" class="form-control" step="0.5" min="0" required>
            </div>
            <div class="mb-3">
                <label>Skills (comma separated)</label>
                <input type="text" name="skills" class="form-control" placeholder="e.g., Python, Django, React" required>
            </div>
            <div class="mb-3">
                <label>Current Location (City)</label>
                <input type="text" name="location" class="form-control" placeholder="e.g., Mumbai" required>
            </div>
            <div class="mb-3">
                <label>Resume (PDF/DOC)</label>
                <input type="file" name="resume" class="form-control" accept=".pdf,.doc,.docx" required>
            </div>
            <button type="submit" class="btn btn-primary">Sign Up</button>
        </form>
        <p class="mt-3">Already have an account? <a href="#">Login</a></p>
    </div>
</div>
{% endblock %}
