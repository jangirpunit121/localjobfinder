{% extends 'base.html' %}
{% block title %}Company Signup{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Company Registration</h3>
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <h5 class="mb-3">Account Details</h5>
                    <div class="row mb-3">
                        
                        <div class="col-md-6">
                            <label for="email" class="form-label">Email *</label>
                            <input type="email" name="email" id="email" class="form-control" required>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="password" class="form-label">Password *</label>
                            <input type="password" name="password" id="password" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label for="mobile_number" class="form-label">Mobile Number *</label>
                            <input type="text" name="mobile_number" id="mobile_number" class="form-control" required>
                        </div>
                    </div>

                    <hr>
                    <h5 class="mb-3">Company Details</h5>
                    <div class="mb-3">
                        <label for="company_name" class="form-label">Company Name *</label>
                        <input type="text" name="company_name" id="company_name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="website" class="form-label">Website</label>
                        <input type="url" name="website" id="website" class="form-control" placeholder="https://example.com">
                    </div>
                    <div class="mb-3">
                        <label for="location" class="form-label">Company Location *</label>
                        <input type="text" name="location" id="location" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Company Description *</label>
                        <textarea name="description" id="description" rows="4" class="form-control" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="contact_number" class="form-label">Contact Number (for WhatsApp/call)</label>
                        <input type="text" name="contact_number" id="contact_number" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label for="logo" class="form-label">Company Logo</label>
                        <input type="file" name="logo" id="logo" class="form-control" accept="image/*">
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Register Company</button>
                </form>
                <p class="mt-3 text-center">Already have an account? <a href="{% url 'company-login' %}">Login here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
